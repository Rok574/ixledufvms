        <meta charset="UTF-8" />

        <meta name="apple-itunes-app" content="app-id=693689912, app-argument=https://www.ixl.com/" />

        <title>IXL | Math, Language Arts, Science, Social Studies, and Spanish</title>

        <link rel="icon" href="https://ixl.com/ixl-favicon.png" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

        <!-- Ixl worker -->

          window.BareMux = BareMux;

        <link rel="stylesheet" href="style.css" />

        <style>
          body {
            margin: 0;

      <body>
        <div id="app"></div>

        <div class="wisp-settings-modal hidden" id="wisp-settings-modal">
          <div class="settings-card">
            <div class="settings-header">
              <h2>Proxy Settings</h2>
              <button id="close-wisp-modal">X</button>
            </div>

            <div class="settings-content">
              <div>Select Server</div>
              <div id="server-list"></div>

              <div>Custom Server</div>
              <div>
                <input type="text" id="custom-wisp-input" placeholder="wss://your-wisp-server.com/wisp/" />
                <button id="save-custom-wisp">+</button>
              </div>
            </div>

            <div class="settings-footer">
              Lower ping = faster browsing
            </div>
          </div>
        </div>
      </body>
